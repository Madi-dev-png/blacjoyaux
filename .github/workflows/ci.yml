name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        coverage: none
        extensions: mbstring,xml,ctype

    - name: Install Composer dependencies
      run: composer install --no-progress --no-suggest --prefer-dist --no-interaction

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install NPM dependencies
      run: |
        npm ci --no-progress

    - name: Build assets
      run: |
        npm run build --if-present

    - name: Run PHPUnit
      run: |
        if [ -f vendor/bin/phpunit ]; then vendor/bin/phpunit --configuration phpunit.xml; else echo "No phpunit binary"; fi
